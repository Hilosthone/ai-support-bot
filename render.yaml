services:
  - type: web
    name: ai-support-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: bot-storage
      mountPath: /data
      sizeGB: 1